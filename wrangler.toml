# Cloudflare Worker configuration for the Sting Trophy Club dashboard.
#
# This project is deployed as a single Cloudflare Worker that:
#   - Serves the static dashboard (public/index.html and public/assets/) via
#     the Workers Static Assets binding.
#   - Handles /api/players[*] in the Worker itself, backed by Cloudflare D1.
#
# See README.md for the full deployment walkthrough. The remote D1 database
# must already exist (database_id below) and migrations must have been
# applied with `wrangler d1 migrations apply stingtrophyclub --remote`.

name = "stingtrophyclub"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# Static assets (dashboard HTML + images). Only files under ./public are
# uploaded and served; migrations/, src/, README.md, etc. remain private to
# the repo. The Worker runs first on /api/* and falls through to the
# ASSETS binding for everything else.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"

# D1 binding consumed by src/worker.js as env.DB
[[d1_databases]]
binding = "DB"
database_name = "stingtrophyclub"
database_id = "47a4f214-ec53-4ea9-9abc-fb892f6c4a29"
migrations_dir = "migrations"

# R2 bucket for player headshot photos.
# Setup steps:
#   1. Create the bucket:  wrangler r2 bucket create stingtrophyclub-photos
#   2. Enable public access in the Cloudflare dashboard (R2 > bucket > Settings
#      > Public Access), then copy the public URL and set:
#         wrangler secret put PHOTOS_BASE_URL
#      (paste the URL, e.g. https://pub-abc123.r2.dev)
#   3. Deploy:  wrangler deploy
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "stingtrophyclub-photos"
preview_bucket_name = "stingtrophyclub-photos-dev"
