name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Ensure shirt_size column exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute stingtrophyclub --remote --command "ALTER TABLE players ADD COLUMN shirt_size TEXT NOT NULL DEFAULT ''"
        continue-on-error: true

      - name: Ensure bio column exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute stingtrophyclub --remote --command "ALTER TABLE players ADD COLUMN bio TEXT NOT NULL DEFAULT ''"
        continue-on-error: true

      - name: Update 4 shirt sizes
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute stingtrophyclub --remote --command "UPDATE players SET shirt_size='AM' WHERE id IN ('kellen-keahey-2010-01-19','santiago-grimaldo-2011-04-14'); UPDATE players SET shirt_size='AS' WHERE id IN ('caleb-kang-2010-09-24','beckett-jones-2011-03-17')"
        continue-on-error: true

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy src/worker.js --name stingtrophyclub
