name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Ensure shirt_size column exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute stingtrophyclub --remote --command "ALTER TABLE players ADD COLUMN shirt_size TEXT NOT NULL DEFAULT ''"
        continue-on-error: true

      - name: Ensure bio column exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute stingtrophyclub --remote --command "ALTER TABLE players ADD COLUMN bio TEXT NOT NULL DEFAULT ''"
        continue-on-error: true

      - name: Set kit numbers for Trey and Roberto
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute stingtrophyclub --remote --command "UPDATE players SET kit_number='12' WHERE id='trey-maggard-2010-08-12'; UPDATE players SET kit_number='28' WHERE id='roberto-roderomahamud-2010-04-12'"
        continue-on-error: true

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy src/worker.js --name stingtrophyclub
